# Nginx config for the local dev stack and (close-to) prod.
#
# Routing intent:
#   /api/*       -> backend-modern (FastAPI)
#   /legacy/*    -> backend-legacy (PHP)
#   /admin/*     -> frontend-admin (CRA build, served as static + reverse proxy in dev)
#   /            -> frontend-customer-portal (Next.js)
#
# In real prod, this file is rendered by ansible from a template. Don't edit prod's
# version through this file directly. See infrastructure/deployment/titan-prod.md.

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    server_tokens off;

    # Logs go to stdout in containers; in real prod they go to /var/log/nginx/*.
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" rt=$request_time';
    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    # Upstreams
    upstream backend_modern { server backend-modern:8000; }
    upstream backend_legacy { server backend-legacy:80;   }
    upstream portal         { server frontend-customer-portal:3000; }
    upstream admin          { server frontend-admin:3000; }

    # Hard cap upload size — the legacy chokes on >5MB anyway.
    client_max_body_size 10m;

    server {
        listen 80;
        server_name _;

        # ── /api -> modern backend ────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend_modern;
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── /legacy -> legacy backend ─────────────────────────────────
        # Allowlist for the monthly invoice runner. Belt-and-suspender to the
        # PHP-side check.
        location = /legacy/invoice/run-monthly {
            allow 10.0.0.0/8;     # internal VPC
            allow 127.0.0.1;
            deny  all;
            proxy_pass http://backend_legacy;
            proxy_set_header Host $host;
        }

        location /legacy/ {
            proxy_pass         http://backend_legacy;
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
            # Strip any stray X-Powered-By the legacy might leak.
            proxy_hide_header  X-Powered-By;
        }

        # ── /admin -> admin SPA ───────────────────────────────────────
        location /admin/ {
            proxy_pass         http://admin/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── / -> customer portal ──────────────────────────────────────
        location / {
            proxy_pass         http://portal;
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            # Pass through Next.js streaming.
            proxy_buffering off;
        }

        # Healthz aggregator — used by the load balancer above us.
        location = /healthz {
            access_log off;
            return 200 '{"ok":true,"layer":"nginx"}';
            add_header Content-Type application/json;
        }
    }
}
